<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="FlotteCam — Gestion de flotte de camions professionnelle. Suivez vos véhicules, chauffeurs et transports en temps réel.">
  <meta name="keywords" content="gestion flotte, camions, transport, GPS, chauffeurs">
  <meta name="theme-color" content="#1B4FD8">
  <meta name="color-scheme" content="light">

  <!-- PWA — Installation sur Android/Chrome -->
  <meta name="mobile-web-app-capable" content="yes">

  <!-- PWA — Installation sur iOS/Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlotteCam">

  <!-- Icônes Apple (iPhone/iPad) -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/Icon-192.png">

  <!-- Splash screens iOS -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Open Graph (partage réseaux sociaux) -->
  <meta property="og:title" content="FlotteCam">
  <meta property="og:description" content="Gestion de flotte de camions professionnelle">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>FlotteCam</title>

  <style>
    /* Splash screen affiché pendant le chargement Flutter */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #1B4FD8;
      overflow: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1B4FD8 0%, #3B6EF0 100%);
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.15);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    .splash-logo svg {
      width: 60px;
      height: 60px;
    }

    .splash-title {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0 0 8px 0;
    }

    .splash-subtitle {
      color: rgba(255,255,255,0.75);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      margin: 0 0 48px 0;
    }

    .splash-loader {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 4px;
      overflow: hidden;
    }

    .splash-loader-bar {
      height: 100%;
      background: white;
      border-radius: 4px;
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes loading {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 70%; margin-left: 15%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>
  <!-- Splash Screen FlotteCam -->
  <div id="splash">
    <div class="splash-logo">
      <!-- Logo FlotteCam SVG inline -->
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Camion -->
        <rect x="4" y="22" width="34" height="20" rx="4" fill="white" opacity="0.9"/>
        <path d="M38 28h8l6 8v6H38V28z" fill="white" opacity="0.9"/>
        <!-- Fenêtre cabine -->
        <rect x="40" y="30" width="6" height="5" rx="1.5" fill="#1B4FD8"/>
        <!-- Roues -->
        <circle cx="14" cy="44" r="5" fill="#1B4FD8"/>
        <circle cx="14" cy="44" r="2.5" fill="white"/>
        <circle cx="46" cy="44" r="5" fill="#1B4FD8"/>
        <circle cx="46" cy="44" r="2.5" fill="white"/>
        <!-- Signal GPS -->
        <circle cx="48" cy="12" r="3" fill="white" opacity="0.9"/>
        <path d="M44 8 Q48 4 52 8" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
        <path d="M41 5 Q48 -1 55 5" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
      </svg>
    </div>
    <p class="splash-title">FlotteCam</p>
    <p class="splash-subtitle">Gestion de flotte professionnelle</p>
    <div class="splash-loader">
      <div class="splash-loader-bar"></div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════════════════════
    // FLOTTECAM PWA — Initialisation
    // 1. Désinstaller SW corrompu (synchrone, avant Flutter)
    // 2. Vérifier version → recharger si nouvelle
    // 3. Démarrer Flutter
    // ══════════════════════════════════════════════════════════════════════
    (function() {
      var VERSION_KEY = 'fc_build';

      // ── Mocker le Service Worker AVANT flutter_bootstrap.js ──────────
      // Flutter appelle navigator.serviceWorker.getRegistration() et .register()
      // On remplace par un mock complet qui ne fait rien mais ne plante pas
      if ('serviceWorker' in navigator) {
        // D'abord désinscrire les SW existants corrompus
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        }).catch(function(){});

        // Remplacer register et getRegistration par des no-ops
        var swMock = {
          register: function() { return Promise.resolve({ scope: '/', installing: null, waiting: null, active: null, addEventListener: function(){} }); },
          getRegistration: function() { return Promise.resolve(undefined); },
          getRegistrations: function() { return Promise.resolve([]); },
          addEventListener: function() {},
          removeEventListener: function() {},
          controller: null,
          ready: Promise.resolve({ scope: '/', active: { postMessage: function(){} } }),
        };
        try {
          Object.defineProperty(navigator, 'serviceWorker', {
            get: function() { return swMock; },
            configurable: true,
          });
        } catch(e) {}
      }

      // ── Vider les caches corrompus ─────────────────────────────────
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        });
      }

      function loadFlutter() {
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        s.async = true;
        document.body.appendChild(s);
      }

      // ── Vérifier version serveur ───────────────────────────────────
      fetch('/version.json?_=' + Date.now(), {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache' }
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var serverBuild = String(data.build_number || '1');
        var localBuild  = localStorage.getItem(VERSION_KEY);
        console.log('[FC] Build local=' + localBuild + ' serveur=' + serverBuild);

        if (localBuild && localBuild !== serverBuild) {
          // Nouvelle version → sauvegarder et recharger PROPREMENT (sans ?v=)
          console.log('[FC] Nouvelle version → rechargement');
          localStorage.setItem(VERSION_KEY, serverBuild);
          // Recharger sans paramètre pour éviter la boucle
          window.location.replace(window.location.pathname);
          return;
        }
        // Première visite ou même version → démarrer
        localStorage.setItem(VERSION_KEY, serverBuild);
        loadFlutter();
      })
      .catch(function() {
        loadFlutter();
      });
    })();

    // ── Masquer le splash quand Flutter est prêt ─────────────────────────
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function() { splash.remove(); }, 500);
      }
    });

    // ══════════════════════════════════════════════════════════════════════
    // VERROUILLAGE PIN HTML — Style WhatsApp
    // 100% JavaScript/HTML — indépendant de Flutter
    // Fonctionne sur iOS PWA, Android PWA, Chrome, Safari
    // ══════════════════════════════════════════════════════════════════════
    (function() {
      // ⚠️ SharedPreferences Flutter Web ajoute le préfixe "flutter."
      // Les clés Dart 'fc_has_pin' deviennent 'flutter.fc_has_pin' dans localStorage
      var PIN_KEY      = 'flutter.fc_has_pin';
      var PIN_HASH_KEY = 'flutter.fc_pin_hash';
      var ATTEMPTS_KEY = 'flutter.fc_pin_attempts';
      var MAX_ATTEMPTS = 3;
      var enteredPin   = '';
      var overlay      = null;

      // ── Vérifier si PIN activé ──────────────────────────────────────
      function hasPinEnabled() {
        return localStorage.getItem(PIN_KEY) === 'true';
      }

      // ── Hash du PIN (même algo que Dart) ───────────────────────────
      function hashPin(pin) {
        var salt = 'FlotteCam2026#';
        var combined = salt + pin + salt;
        var hash = 0;
        for (var i = 0; i < combined.length; i++) {
          hash = ((hash << 5) - hash + combined.charCodeAt(i)) & 0xFFFFFFFF;
        }
        return (hash >>> 0).toString(16).padStart(8, '0');
      }

      // ── Créer l'overlay PIN ────────────────────────────────────────
      function showPinOverlay() {
        if (overlay) return; // déjà affiché
        enteredPin = '';

        overlay = document.createElement('div');
        overlay.id = 'pin-overlay';
        overlay.innerHTML = `
          <div style="
            position:fixed;inset:0;
            background:linear-gradient(135deg,#0F172A 0%,#1A2744 100%);
            display:flex;flex-direction:column;align-items:center;
            justify-content:space-between;padding:60px 0 40px;
            z-index:99999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
          ">
            <!-- Logo -->
            <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
              <div style="
                width:72px;height:72px;border-radius:20px;
                background:linear-gradient(135deg,#1B4FD8,#3B6EF0);
                display:flex;align-items:center;justify-content:center;
                box-shadow:0 10px 30px rgba(27,79,216,0.5);
              ">
                <svg width="38" height="38" viewBox="0 0 24 24" fill="white">
                  <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                </svg>
              </div>
              <div style="text-align:center;">
                <div style="color:white;font-size:22px;font-weight:800;letter-spacing:-0.5px;">FlotteCam</div>
                <div style="color:rgba(255,255,255,0.5);font-size:14px;margin-top:4px;">Entrez votre code PIN</div>
              </div>
            </div>

            <!-- Points PIN -->
            <div>
              <div id="pin-dots" style="display:flex;gap:20px;justify-content:center;margin-bottom:16px;">
                ${[0,1,2,3].map(function(i){ return '<div id="dot-'+i+'" style="width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.15s;"></div>'; }).join('')}
              </div>
              <div id="pin-error" style="color:#EF4444;font-size:13px;text-align:center;min-height:20px;font-weight:500;"></div>
            </div>

            <!-- Clavier -->
            <div style="width:100%;max-width:280px;padding:0 20px;">
              ${[['1','2','3'],['4','5','6'],['7','8','9'],['','0','⌫']].map(function(row){
                return '<div style="display:flex;justify-content:space-between;margin-bottom:12px;">' +
                  row.map(function(k){
                    if(!k) return '<div style="width:72px;height:66px;"></div>';
                    return '<button onclick="window._pinKey(\''+k+'\')" style="'+
                      'width:72px;height:66px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);'+
                      'background:rgba(255,255,255,0.08);color:white;font-size:'+(k==='⌫'?'20':'22')+'px;'+
                      'font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;'+
                      'display:flex;align-items:center;justify-content:center;">'+k+'</button>';
                  }).join('') +
                '</div>';
              }).join('')}

              <!-- Bouton identifiants -->
              <div style="text-align:center;margin-top:8px;">
                <button onclick="window._pinUsePassword()" style="
                  background:none;border:none;color:rgba(255,255,255,0.35);
                  font-size:13px;cursor:pointer;padding:8px;
                ">Utiliser mes identifiants</button>
              </div>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
      }

      // ── Masquer l'overlay ──────────────────────────────────────────
      function hidePinOverlay() {
        if (overlay) {
          overlay.remove();
          overlay = null;
        }
      }

      // ── Mettre à jour les points visuels ───────────────────────────
      function updateDots() {
        for (var i = 0; i < 4; i++) {
          var dot = document.getElementById('dot-' + i);
          if (!dot) continue;
          if (i < enteredPin.length) {
            dot.style.background = '#1B4FD8';
            dot.style.width = '20px';
            dot.style.height = '20px';
            dot.style.boxShadow = '0 0 12px rgba(27,79,216,0.8)';
          } else {
            dot.style.background = 'rgba(255,255,255,0.2)';
            dot.style.width = '16px';
            dot.style.height = '16px';
            dot.style.boxShadow = 'none';
          }
        }
      }

      // ── Gestion des touches ────────────────────────────────────────
      window._pinKey = function(key) {
        if (key === '⌫') {
          enteredPin = enteredPin.slice(0, -1);
          updateDots();
          return;
        }
        if (enteredPin.length >= 4) return;
        enteredPin += key;
        updateDots();

        if (enteredPin.length === 4) {
          setTimeout(function() { verifyPin(); }, 150);
        }
      };

      // ── Vérifier le PIN ────────────────────────────────────────────
      function verifyPin() {
        var stored   = localStorage.getItem(PIN_HASH_KEY);
        var entered  = hashPin(enteredPin);
        var attempts = parseInt(localStorage.getItem(ATTEMPTS_KEY) || '0');

        if (entered === stored) {
          // ✅ Correct
          localStorage.setItem(ATTEMPTS_KEY, '0');
          hidePinOverlay();
          // Informer Flutter que le PIN est validé
          if (window._flutterShowPin) window._flutterShowPin();
        } else {
          // ❌ Incorrect
          attempts++;
          localStorage.setItem(ATTEMPTS_KEY, attempts.toString());
          var remaining = MAX_ATTEMPTS - attempts;

          // Animation erreur
          var dots = document.getElementById('pin-dots');
          if (dots) {
            dots.style.animation = 'none';
            dots.offsetHeight; // reflow
            dots.style.transition = 'transform 0.05s';
            var shakes = 0;
            var shakeInterval = setInterval(function() {
              dots.style.transform = shakes % 2 === 0 ? 'translateX(10px)' : 'translateX(-10px)';
              shakes++;
              if (shakes > 5) {
                clearInterval(shakeInterval);
                dots.style.transform = 'translateX(0)';
              }
            }, 60);
          }

          // Mettre les points en rouge
          for (var i = 0; i < 4; i++) {
            var dot = document.getElementById('dot-' + i);
            if (dot) dot.style.background = '#EF4444';
          }

          if (remaining <= 0) {
            // Trop de tentatives → déconnecter
            localStorage.removeItem(PIN_HASH_KEY);
            localStorage.removeItem(PIN_KEY);
            localStorage.removeItem(ATTEMPTS_KEY);
            localStorage.removeItem('flutter.fleet_auth_token');
            localStorage.removeItem('flutter.fleet_auth_user');
            hidePinOverlay();
            window.location.reload();
          } else {
            var errEl = document.getElementById('pin-error');
            if (errEl) errEl.textContent = 'Code incorrect — ' + remaining + ' essai' + (remaining > 1 ? 's' : '') + ' restant' + (remaining > 1 ? 's' : '');
            setTimeout(function() {
              enteredPin = '';
              updateDots();
            }, 600);
          }
        }
      }

      // ── Utiliser identifiants ──────────────────────────────────────
      window._pinUsePassword = function() {
        localStorage.removeItem(PIN_HASH_KEY);
        localStorage.removeItem(PIN_KEY);
        localStorage.removeItem(ATTEMPTS_KEY);
        hidePinOverlay();
        // Déconnecter proprement
        localStorage.removeItem('flutter.fleet_auth_token');
        localStorage.removeItem('flutter.fleet_auth_user');
        window.location.reload();
      };

      // ── Détecter quand l'app passe en arrière-plan ─────────────────
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && hasPinEnabled()) {
          showPinOverlay();
        }
      });

      // iOS Safari PWA — pagehide/pageshow
      window.addEventListener('pageshow', function() {
        if (hasPinEnabled()) showPinOverlay();
      });

      // Focus (retour depuis autre app)
      window.addEventListener('focus', function() {
        if (hasPinEnabled() && !overlay) showPinOverlay();
      });

      // Exposer pour Flutter (après login + création PIN)
      window._hidePinOverlay = hidePinOverlay;
      window._showPinOverlay = showPinOverlay;

    })();
  </script>
</body>
</html>
