name: flottecam
description: FlotteCam - Gestion de flotte de camions professionnelle
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # Storage — shared_preferences utilisé sur web, flutter_secure_storage sur mobile
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Web Push Notifications
  web: ^1.1.0

  # Social Auth (désactivé temporairement — nécessite config GoogleService-Info.plist)
  # google_sign_in: ^6.2.1
  # flutter_facebook_auth: ^6.1.1

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.66.2
  flutter_animate: ^4.5.0
  badges: ^3.1.2

  # Notifications (Firebase — décommenter après configuration firebase_options.dart)
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.10
  # flutter_local_notifications: ^16.3.0

  # Utils
  intl: ^0.19.0
  image_picker: ^1.0.7
  # permission_handler: ^11.3.0  # désactivé — non compatible Flutter Web
  connectivity_plus: ^6.0.3
  url_launcher: ^6.2.4
  signature: ^5.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
