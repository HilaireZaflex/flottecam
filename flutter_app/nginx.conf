server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        font/woff2;
    gzip_min_length 1000;

    # Headers de sécurité
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ══ SOLUTION CACHE iOS Safari ══════════════════════════════════════════
    # Tous les fichiers sans hash → NO CACHE (mis à jour immédiatement)
    # Fichiers avec hash dans le nom → cache long (immuables)

    # index.html — JAMAIS en cache (point d'entrée de l'app)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # flutter_bootstrap.js — JAMAIS en cache
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # flutter_service_worker.js — JAMAIS en cache
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # flutter.js — JAMAIS en cache
    location = /flutter.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # manifest.json — JAMAIS en cache
    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # version.json — JAMAIS en cache
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # main.dart.js — JAMAIS en cache (contient le code Flutter compilé)
    location = /main.dart.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Assets avec hash → cache long (safe, le hash change à chaque build)
    location ~* /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Fonts et images → cache modéré
    location ~* \.(woff2|ttf|png|jpg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        try_files $uri =404;
    }

    # ── SPA Routing — toutes les routes → index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}
